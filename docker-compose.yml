services:
  # ==========================================
  # 1. BASE DE DATOS
  # ==========================================
  postgres-db:
    image: postgres:15-alpine
    container_name: calisaas_postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: admin_db
      POSTGRES_PASSWORD: password_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - calisaas_network

  # ==========================================
  # 2. KEYCLOAK (Con el Tema de CaliSaaS)
  # ==========================================
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: calisaas_keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-db:5432/keycloak
      KC_DB_USERNAME: admin_db
      KC_DB_PASSWORD: password_db
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    ports:
      - "8080:8080"
    volumes:
      - ./themes/calisaas:/opt/keycloak/themes/calisaas:ro
    depends_on:
      - postgres-db
    networks:
      - calisaas_network

  # ==========================================
  # 3. ZOOKEEPER
  # ==========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: calisaas_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - calisaas_network

  # ==========================================
  # 4. KAFKA
  # ==========================================
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: calisaas_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - calisaas_network

  # ==========================================
  # 5. KAFKA UI
  # ==========================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: calisaas_kafka_ui
    depends_on:
      - kafka
    ports:
      - "8083:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - calisaas_network

volumes:
  postgres_data:

networks:
  calisaas_network:
    driver: bridge